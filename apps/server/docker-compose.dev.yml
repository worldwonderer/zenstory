services:
  postgres:
    image: postgres:16-alpine
    container_name: zenstory-postgres
    environment:
      POSTGRES_USER: zenstory
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: zenstory
    ports:
      - "5432:5432"
    volumes:
      - zenstory_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zenstory"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  zenstory_postgres_data:
