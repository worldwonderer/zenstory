# Railway 配置 - Prefect Server
# 部署 Prefect 调度服务器

[build]
builder = "dockerfile"
# Repo-root-relative: the Dockerfile COPYs apps/server/... so the build context is the
# repo root (set Root Directory empty in Railway), and this path is resolved from there.
dockerfilePath = "apps/server/docker/Dockerfile.prefect-server"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
