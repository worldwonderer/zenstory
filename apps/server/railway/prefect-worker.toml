# Railway 配置 - Prefect Worker
# 部署 Prefect 工作节点

[build]
builder = "dockerfile"
# Repo-root-relative: the Dockerfile COPYs apps/server/... so the build context is the
# repo root (set Root Directory empty in Railway), and this path is resolved from there.
dockerfilePath = "apps/server/docker/Dockerfile.prefect-worker"

[deploy]
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
