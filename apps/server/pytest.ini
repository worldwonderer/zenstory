[pytest]
# Pytest configuration for zenstory backend testing

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test directories
testpaths = tests

# Asyncio mode for async tests
asyncio_mode = auto

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --cov=.
    --cov-report=term
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=0
    -n auto
    --dist=loadscope

# Xdist configuration for parallel execution
# -n auto: Automatically use all available CPU cores
# --dist=loadscope: Group tests by module/class for better isolation

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may use external services)
    slow: Slow tests (may take > 1 second)
    async: Async tests that require pytest-asyncio
    asyncio: Async tests managed by pytest-asyncio
    e2e: End-to-end tests (full workflow validation)
    real_llm: Tests that call real LLM providers (requires explicit env opt-in)
