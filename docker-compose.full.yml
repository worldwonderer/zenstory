# zenstory - Production with PostgreSQL + Redis
# ==============================================
# 1. cp apps/server/.env.docker.example apps/server/.env.docker
# 2. cp apps/web/.env.docker.example apps/web/.env.docker
# 3. Edit .env.docker files with your production values
# 4. docker compose -f docker-compose.full.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: zenstory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zenstory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-zenstory}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - zenstory_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zenstory} -d ${POSTGRES_DB:-zenstory}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: zenstory-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - zenstory_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: zenstory-server
    restart: unless-stopped
    env_file:
      - ./apps/server/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-8000}:8080"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: zenstory-web
    restart: unless-stopped
    env_file:
      - ./apps/web/.env.docker
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-5173}:5173"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5173',res=>process.exit(res.statusCode<500?0:1)).on('error',()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  zenstory_postgres_data:
  zenstory_redis_data:
