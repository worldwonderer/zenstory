name: Zenstory Browser Lanes

on:
  push:
    branches:
      - "bugfix/**"
      - "feature/**"
      - "chore/**"
  workflow_dispatch:
    inputs:
      suite:
        description: "Zenstory browser lane"
        required: true
        default: "default"
        type: choice
        options:
          - smoke
          - default
          - nightly
          - release
          - full

concurrency:
  group: zenstory-browser-lanes-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.suite || 'branch-validation' }}
  cancel-in-progress: true

jobs:
  zenstory-browser-lane:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ github.event_name == 'workflow_dispatch' && fromJson(format('["{0}"]', github.event.inputs.suite)) || fromJson('["default","nightly"]') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.29.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          cd apps/server
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        run: |
          cd apps/web
          pnpm install

      - name: Install Playwright browsers
        run: |
          cd apps/web
          pnpm exec playwright install --with-deps chromium

      - name: Run selected zenstory browser lane
        env:
          E2E_SUITE: ${{ matrix.suite }}
        run: |
          bash scripts/ci/ci.sh e2e --lite
