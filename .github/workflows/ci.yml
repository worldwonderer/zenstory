name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.server_backend }}
      frontend: ${{ steps.filter.outputs.web_frontend }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Detect changed paths
      id: filter
      uses: dorny/paths-filter@v3
      with:
        filters: |
          server_backend:
            - 'apps/server/**'
          web_frontend:
            - 'apps/web/**'
          ci:
            - '.github/workflows/**'
            - '.github/actions/**'
            - 'scripts/ci/**'

  frontend-lint:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup frontend
      uses: ./.github/actions/setup-frontend

    - name: Check CSS design token usage
      run: |
        cd apps/web
        pnpm lint:tokens

    - name: Check i18n defaultValue key coverage
      run: |
        cd apps/web
        pnpm lint:i18n-keys

    - name: Run ESLint
      run: |
        cd apps/web
        pnpm lint

  ci-lint:
    needs: detect-changes
    if: needs.detect-changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install yamllint
      run: |
        python -m pip install --upgrade pip
        pip install yamllint

    - name: Lint CI workflows
      run: |
        yamllint .github/workflows/ .github/actions/

  backend-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8

    services: &service-configs
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: zenstory_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        cd apps/server
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff

    - name: Run ruff
      run: |
        cd apps/server
        ruff check agent/ api/ services/

    - name: Create test environment file
      run: |
        cd apps/server
        cat > .env.test << EOF
        DATABASE_URL=postgresql://test:test@localhost:5433/zenstory_test
        REDIS_URL=redis://localhost:6380/1
        OPENAI_API_KEY=test-key-for-ci-testing
        JWT_SECRET_KEY=test-secret-key-min-32-characters-for-ci-testing
        REDEMPTION_CODE_HMAC_SECRET=test-hmac-secret-min-32-characters-for-ci
        ZHIPU_EMBEDDINGS_API_KEY=skip-vector-tests-in-ci
        EOF

    - name: Run unit tests with pytest
      run: |
        cd apps/server
        pytest --cov=. --cov-report=xml --cov-report=term --cov-fail-under=80 --durations=15 -v

    - name: Run flow tests
      run: |
        cd apps/server
        pytest tests/test_flows -v --maxfail=1

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./apps/server/coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  frontend-test:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup frontend
      uses: ./.github/actions/setup-frontend

    - name: Run frontend tests with coverage
      run: |
        cd apps/web
        pnpm test:coverage

    - name: Upload frontend coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./apps/web/coverage/lcov.info
        flags: frontend
        name: frontend-coverage
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  frontend-build:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup frontend
      uses: ./.github/actions/setup-frontend

    - name: Build with typecheck
      run: |
        cd apps/web
        pnpm build:typecheck

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: web-dist
        path: apps/web/dist/
        retention-days: 7

  ci-summary:
    runs-on: ubuntu-latest
    needs: [detect-changes, frontend-lint, ci-lint, backend-test, frontend-test, frontend-build]
    if: always()
    steps:
    - name: Check CI results
      env:
        FRONTEND_LINT_RESULT: ${{ needs['frontend-lint'].result }}
        CI_LINT_RESULT: ${{ needs['ci-lint'].result }}
        BACKEND_TEST_RESULT: ${{ needs['backend-test'].result }}
        FRONTEND_TEST_RESULT: ${{ needs['frontend-test'].result }}
        FRONTEND_BUILD_RESULT: ${{ needs['frontend-build'].result }}
      run: |
        echo "Frontend lint: $FRONTEND_LINT_RESULT"
        echo "CI lint: $CI_LINT_RESULT"
        echo "Backend tests: $BACKEND_TEST_RESULT"
        echo "Frontend tests: $FRONTEND_TEST_RESULT"
        echo "Frontend build: $FRONTEND_BUILD_RESULT"

        check_job() {
          local job_name="$1"
          local job_result="$2"
          if [[ "$job_result" == "success" || "$job_result" == "skipped" ]]; then
            return
          fi
          echo "::error::$job_name failed with result: $job_result"
          exit 1
        }

        check_job "frontend-lint" "$FRONTEND_LINT_RESULT"
        check_job "ci-lint" "$CI_LINT_RESULT"
        check_job "backend-test" "$BACKEND_TEST_RESULT"
        check_job "frontend-test" "$FRONTEND_TEST_RESULT"
        check_job "frontend-build" "$FRONTEND_BUILD_RESULT"

        echo "All CI checks passed!"
