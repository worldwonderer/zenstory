        E2E_TEST_PASSWORD: E2eTestPassword123!
        E2E_TEST_USERNAME: e2e_test_user

    - name: Job Timing Summary
      if: always()
      run: |
        JOB_END=$(date +%s)
        DURATION=$((JOB_END - JOB_START))
        echo "## ⏱️ Job Timing Summary" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Duration | $(printf '%02d:%02d' $((DURATION/60)) $((DURATION%60))) |" >> $GITHUB_STEP_SUMMARY
        echo "| Completed | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY

  frontend-prod-bundle-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    services: *service-configs
    steps:
    - name: Job Start Time
      run: echo "JOB_START=$(date +%s)" >> $GITHUB_ENV

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 10.29.3

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install backend dependencies
      run: |
        cd apps/server
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install frontend dependencies
      run: |
        cd apps/web
        pnpm install

    - name: Install Playwright browser
      run: |
        cd apps/web
        pnpm exec playwright install --with-deps chromium

    - name: Create test environment file
      run: |
        cd apps/server
        cat > .env.test << EOF
        DATABASE_URL=postgresql://test:test@localhost:5433/zenstory_test
        REDIS_URL=redis://localhost:6380/1
        OPENAI_API_KEY=test-key-for-ci-testing
        JWT_SECRET_KEY=test-secret-key-min-32-characters-for-ci-testing
        ANTHROPIC_API_KEY=test-key-for-ci-testing
        E2E_TEST_EMAIL=e2e-test@zenstory.local
        E2E_TEST_PASSWORD=E2eTestPassword123!
        E2E_TEST_USERNAME=e2e_test_user
        EOF

    - name: Run database migrations
      run: |
        cd apps/server
        cp .env.test .env
        python -c "from database import init_db; import asyncio; asyncio.run(init_db())"
        alembic stamp head || alembic upgrade head

    - name: Seed test user
      run: |
        cd apps/server
        python scripts/seed_test_user.py

    - name: Start backend server
      run: |
        cd apps/server
        python main.py &
        sleep 5
      env:
        PYTHONUNBUFFERED: 1

    - name: Wait for backend health check
      run: |
        for i in {1..30}; do
          if curl -f http://localhost:8000/health 2>/dev/null; then
            echo "Backend is healthy!"
            exit 0
          fi
          echo "Waiting for backend... ($i/30)"
          sleep 1
        done
        echo "Backend failed to start"
        exit 1

    - name: Build production bundle
      run: |
        cd apps/web
        pnpm build

    - name: Start preview server
      run: |
        cd apps/web
        pnpm preview --host 127.0.0.1 --port 4173 &
        echo $! > /tmp/web-preview.pid

    - name: Wait for preview server
      run: |
        for i in {1..30}; do
          if curl -f http://127.0.0.1:4173 >/dev/null 2>&1; then
            echo "Preview server is healthy!"
            exit 0
          fi
          echo "Waiting for preview... ($i/30)"
          sleep 1
        done
        echo "Preview server failed to start"
        if [[ -f /tmp/web-preview.pid ]]; then
          kill "$(cat /tmp/web-preview.pid)" || true
        fi
        exit 1

    - name: Run production bundle smoke test
      run: |
        cd apps/web
        pnpm exec playwright test --config=playwright.prod-smoke.config.ts
      env:
        CI: true
        E2E_BASE_URL: http://127.0.0.1:4173
        E2E_TEST_EMAIL: e2e-test@zenstory.local
        E2E_TEST_PASSWORD: E2eTestPassword123!
        E2E_TEST_USERNAME: e2e_test_user

    - name: Upload production smoke report
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-prod-smoke-report
        path: apps/web/playwright-report/
        retention-days: 7

    - name: Stop preview server
      if: always()
      run: |
        if [[ -f /tmp/web-preview.pid ]]; then
          kill "$(cat /tmp/web-preview.pid)" || true
        fi

    - name: Job Timing Summary
      if: always()
      run: |
        JOB_END=$(date +%s)
        DURATION=$((JOB_END - JOB_START))
        echo "## ⏱️ Job Timing Summary (Frontend Production Bundle Smoke)" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Duration | $(printf '%02d:%02d' $((DURATION/60)) $((DURATION%60))) |" >> $GITHUB_STEP_SUMMARY
        echo "| Completed | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY

  # Test Summary - All tests must pass
  test-summary:
    runs-on: ubuntu-latest
    needs: [frontend-lint, backend-test, server-flows-test, frontend-test, smoke-test, frontend-prod-bundle-smoke, frontend-build, e2e-test]
    if: always()
    steps:
    - name: Job Start Time
      run: echo "JOB_START=$(date +%s)" >> $GITHUB_ENV

    - name: Check test results
      run: |
        echo "Frontend lint: ${{ needs['frontend-lint'].result }}"
        echo "Backend tests: ${{ needs['backend-test'].result }}"
        echo "Server flows tests: ${{ needs['server-flows-test'].result }}"
        echo "Frontend tests: ${{ needs['frontend-test'].result }}"
        echo "Smoke tests: ${{ needs['smoke-test'].result }}"
        echo "Frontend production bundle smoke: ${{ needs['frontend-prod-bundle-smoke'].result }}"
        echo "Frontend build: ${{ needs['frontend-build'].result }}"
        echo "E2E tests: ${{ needs['e2e-test'].result }}"

        failed=""
        check_job() {
          local job_name="$1"
          local job_result="$2"
          local allow_skipped="${3:-false}"
          if [[ "$job_result" == "success" ]]; then
            return
          fi
          if [[ "$allow_skipped" == "true" && "$job_result" == "skipped" ]]; then
            return
          fi
          if [[ "$job_result" != "success" ]]; then
            failed="$failed $job_name"
          fi
        }

        check_job "frontend-lint" "${{ needs['frontend-lint'].result }}"
        check_job "backend-test" "${{ needs['backend-test'].result }}"
        check_job "server-flows-test" "${{ needs['server-flows-test'].result }}"
        check_job "frontend-test" "${{ needs['frontend-test'].result }}"
        smoke_allow_skipped="false"
        if [[ "${{ github.event_name }}" != "pull_request" ]]; then
          smoke_allow_skipped="true"
        fi
        check_job "smoke-test" "${{ needs['smoke-test'].result }}" "$smoke_allow_skipped"
        check_job "frontend-prod-bundle-smoke" "${{ needs['frontend-prod-bundle-smoke'].result }}" "$smoke_allow_skipped"
        check_job "frontend-build" "${{ needs['frontend-build'].result }}"
        check_job "e2e-test" "${{ needs['e2e-test'].result }}"

        if [[ -n "$failed" ]]; then
          echo "::error::The following jobs failed:$failed"
          exit 1
        fi
        echo "All test suites passed!"

    - name: Workflow Timing Summary
      if: always()
      run: |
        echo "## ⏱️ Complete Test Suite Timing Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Job Results" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Frontend Lint | ${{ needs['frontend-lint'].result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Backend Tests | ${{ needs['backend-test'].result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Server Flows Tests | ${{ needs['server-flows-test'].result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Frontend Tests | ${{ needs['frontend-test'].result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Smoke Tests | ${{ needs['smoke-test'].result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Frontend Prod Bundle Smoke | ${{ needs['frontend-prod-bundle-smoke'].result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Frontend Build | ${{ needs['frontend-build'].result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| E2E Tests | ${{ needs['e2e-test'].result }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "_See individual job summaries for detailed timing information._" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Completed at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
