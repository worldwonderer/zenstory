name: 'Setup Frontend'
description: 'Setup pnpm, Node.js, and install dependencies for the frontend app'

runs:
  using: 'composite'
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 10.29.3

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      shell: bash
      run: |
        cd apps/web
        pnpm install
